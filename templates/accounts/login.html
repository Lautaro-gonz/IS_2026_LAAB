<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="cross">✚</div>
      <h1>Clínica Turnos</h1>
      <p>Sistema de gestión de turnos médicos</p>
    </div>

    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="message {{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form method="post" style="display:flex;flex-direction:column;gap:14px;">
      {% csrf_token %}
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" placeholder="tu_usuario" autofocus required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:6px;justify-content:center;">
        Iniciar sesión
      </button>
    </form>

    <div style="margin-top:20px;padding:14px;background:var(--surface2);border-radius:var(--radius);font-size:13px;color:var(--text-soft);">
      <strong>Usuarios de prueba:</strong><br>
      admin / admin123 &nbsp;·&nbsp; secretaria / secre123<br>
      doctor1 / doc123 &nbsp;·&nbsp; paciente1 / pac123
    </div>
  </div>
</div>
</body>
</html>
